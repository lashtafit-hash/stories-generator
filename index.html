<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Генератор сторис</title>

<style>
body {
  margin: 0;
  background: #0b0b0f;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

.container {
  max-width: 800px;
  margin: 80px auto;
  padding: 40px;
}

h1 {
  font-size: 36px;
  margin-bottom: 30px;
}

input, textarea, select {
  width: 100%;
  background: #14141a;
  border: 1px solid #2a2a35;
  color: white;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  font-size: 14px;
}

button {
  background: linear-gradient(90deg,#ff2e88,#ff6ec7);
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 30px;
  white-space: pre-wrap;
  line-height: 1.6;
  background: #111117;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #2a2a35;
}
</style>

</head>

<body>

<div class="container">

<h1>Генератор сторис</h1>

<input id="niche" placeholder="Ниша (например: мастер маникюра / блогер / косметолог)">
<textarea id="topic" placeholder="О чём сторис"></textarea>
<input id="goal" placeholder="Цель (необязательно)">

<select id="tone">
<option value="игривый">Игривый</option>
<option value="экспертный">Экспертный</option>
<option value="дерзкий">Дерзкий</option>
<option value="мири">🔥 Мири</option>
<option value="ева">💎 Ева</option>
</select>

<button onclick="generate()">Создать сторис</button>

<div id="result" class="result"></div>

</div>

<script>
const API = "https://web-production-3a26.up.railway.app";

async function generate() {

  const niche = document.getElementById("niche").value;
  const topic = document.getElementById("topic").value;
  const goal = document.getElementById("goal").value;
  const tone = document.getElementById("tone").value;

  const resultBlock = document.getElementById("result");
  resultBlock.innerText = "Генерирую...";

  try {
    const res = await fetch(API + "/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        niche,
        topic,
        goal,
        tone,
        count: 5,
        cat: "life"
      })
    });

    const data = await res.json();

    resultBlock.innerText = data.result;

  } catch (e) {
    resultBlock.innerText = "Ошибка подключения";
  }
}
</script>

</body>
</html>
