<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Stories Generator</title>
</head>

<body style="background:black; color:white; font-family:sans-serif; padding:20px">

<h2>Генератор сторис</h2>

<input id="niche" placeholder="твоя ниша" style="width:100%; margin-bottom:10px">
<input id="topic" placeholder="тема" style="width:100%; margin-bottom:10px">
<input id="goal" placeholder="цель" style="width:100%; margin-bottom:10px">

<select id="tone">
<option value="игривый">игривый</option>
<option value="экспертный">экспертный</option>
<option value="дерзкий">дерзкий</option>
<option value="мири">🔥 Мири</option>
<option value="ева">💎 Ева</option>
</select>

<br><br>

<button onclick="generate()">Сгенерировать</button>

<pre id="result" style="margin-top:20px"></pre>

<script>
const API = "https://web-production-3a26.up.railway.app";

async function generate() {

  const niche = document.getElementById("niche").value;
  const topic = document.getElementById("topic").value;
  const goal = document.getElementById("goal").value;
  const tone = document.getElementById("tone").value;

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      niche,
      topic,
      goal,
      tone,
      count: 5,
      cat: "life"
    })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.result;
}
</script>

</body>
</html>
